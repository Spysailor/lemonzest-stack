# Config nginx pour marketplace.lemonzest.digital
# Container nginx:alpine, site statique, derrière Traefik (TLS termine sur Traefik)

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # Healthcheck interne (utilisé par docker healthcheck)
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Bloque les fichiers de "noise" présents dans marketplace-site/
    # (CLAUDE.md, README.md, .gitignore, vercel.json, etc.)
    # Utile parce que le bind mount pointe directement sur le repo Git.
    location ~ /\. { deny all; access_log off; log_not_found off; }
    location ~* \.(md|yml|yaml|json|lock)$ {
        # On garde vercel.json accessible ? Non, on bloque tout.
        deny all;
        access_log off;
        log_not_found off;
    }

    # Redirection /acheter → Gumroad
    # TODO : remplacer le slug après création du produit Gumroad
    location = /acheter {
        return 302 https://gumroad.com/l/marketing-agence-fr;
    }

    # Compression gzip (Traefik fait aussi gzip+brotli, double couche sans conflit)
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml
        font/woff2;

    # Cache long pour assets statiques (hash dans le nom si besoin plus tard)
    location ~* \.(css|js|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|webp|avif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # HTML → no-cache (on veut que les MAJ de contenu soient immédiates)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # 404 → renvoie l'index (SPA-friendly si besoin plus tard)
    error_page 404 /index.html;

    # Masquer la version nginx dans les headers (les vrais headers sécu
    # viennent de Traefik middlewares, voir docker-compose.marketplace.yml)
    server_tokens off;
}
