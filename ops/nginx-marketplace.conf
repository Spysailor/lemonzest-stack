# Config nginx pour marketplace.lemonzestdigital.com
# Container nginx:alpine, site statique, derrière Traefik (TLS termine sur Traefik)

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # Nginx est derrière Traefik (TLS termine sur Traefik, backend HTTP).
    # Sans ces directives, les redirects auto (ex: /foo → /foo/ sur un dossier)
    # renvoient "http://marketplace.lemonzestdigital.com/foo/" — ce qui force
    # un deuxième round-trip http→https via Traefik. On passe en relatif.
    absolute_redirect off;
    port_in_redirect off;

    # Healthcheck interne (utilisé par docker healthcheck)
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Bloque les fichiers de "noise" présents dans marketplace-site/
    # (CLAUDE.md, README.md, .gitignore, vercel.json, etc.)
    # Utile parce que le bind mount pointe directement sur le repo Git.
    location ~ /\. { deny all; access_log off; log_not_found off; }
    location ~* \.(md|yml|yaml|json|lock)$ {
        # On garde vercel.json accessible ? Non, on bloque tout.
        deny all;
        access_log off;
        log_not_found off;
    }

    # Redirection /acheter → Gumroad
    # TODO : remplacer le slug après création du produit Gumroad
    location = /acheter {
        return 302 https://lemonzestdigital.gumroad.com/l/marketing-agence-fr;
    }

    # Compression gzip (Traefik fait aussi gzip+brotli, double couche sans conflit)
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml
        font/woff2;

    # Cache long pour assets statiques (hash dans le nom si besoin plus tard)
    location ~* \.(css|js|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|webp|avif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # HTML → no-cache (on veut que les MAJ de contenu soient immédiates)
    # Astro genère un dossier par route (format: directory), donc on teste :
    #   1) $uri       → fichier exact (ex: /favicon.svg, /robots.txt)
    #   2) $uri/      → répertoire + directive `index` (sert son index.html)
    #                   — donne un 301 vers /uri/ si la request était sans slash
    #   3) $uri.html  → fichier HTML direct (ex: /404 → /404.html) sans redirect
    #   4) =404       → déclenche error_page (qui servira /404.html)
    location / {
        try_files $uri $uri/ $uri.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # 404 → page d'erreur dédiée (générée par src/pages/404.astro).
    # `internal` : n'accepte que les sous-requêtes depuis error_page (pas
    # d'accès direct à /404.html avec un HTTP 200 — il répondra 404 lui-même).
    error_page 404 /404.html;
    location = /404.html {
        internal;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Masquer la version nginx dans les headers (les vrais headers sécu
    # viennent de Traefik middlewares, voir docker-compose.marketplace.yml)
    server_tokens off;
}
